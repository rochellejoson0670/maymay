<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Request for Proposal</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background: #f5f5f5;
        margin: 0;
        padding: 40px;
    }

    h1 {
        color: #e27a43;
        margin-bottom: 20px;
    }

    .form-container {
        background: #fff;
        padding: 25px;
        border: 2px solid #ccc;
        max-width: 600px;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 15px;
    }

    input[type="text"],
    input[type="email"],
    input[type="password"],
    textarea,
    select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #999;
        border-radius: 3px;
    }

    textarea {
        height: 100px;
        resize: vertical;
    }

    .radio-group, .checkbox-group {
        margin-top: 10px;
    }

    .radio-group label,
    .checkbox-group label {
        font-weight: normal;
        display: block;
    }

    button {
        margin-top: 20px;
        padding: 10px 20px;
        background: #4a90e2;
        color: #fff;
        border: none;
        border-radius: 4px;
        cursor: pointer;
    }

    button:hover {
        background: #357ac9;
    }
</style>

</head>
<body>

<h1>How can we help?</h1>

<div class="form-container">
    <h2>Request for Proposal</h2>

    <form>

        <label>Your company:</label>
        <input type="text" name="company">

        <label>Email:</label>
        <input type="email" name="email">

        <label>Username:</label>
        <input type="text" name="username">

        <label>Password:</label>
        <input type="password" name="password">

        <label>Your business:</label>
        <textarea placeholder="Briefly describe your business in this space"></textarea>

        <label>Company Size:</label>
        <div class="radio-group">
            <label><input type="radio" name="size" value="less10"> Less than 10</label>
            <label><input type="radio" name="size" value="11-50"> 11 to 50</label>
            <label><input type="radio" name="size" value="50-200"> 50 to 200</label>
            <label><input type="radio" name="size" value="over200"> Over 200</label>
        </div>

        <label>Services:</label>
        <div class="checkbox-group">
            <label><input type="checkbox" name="service" value="brand"> Brand Identity</label>
            <label><input type="checkbox" name="service" value="website"> New Website</label>
            <label><input type="checkbox" name="service" value="redesign"> Web Redesign</label>
        </div>

        <label>Timeline:</label>
        <select>
            <option>Immediately</option>
            <option>1–3 Months</option>
            <option>3–6 Months</option>
            <option>More than 6 Months</option>
        </select>

        <button type="submit">Send to dev/design</button>

    </form>
</div>

</body>
</html>
